#
# General
#

set $mod Mod4
set $modShift Mod4+Shift
set $modCtrl Mod4+Ctrl
set $modAlt Mod4+Alt
set $meh Ctrl+Shift+Alt
set $screen DP-3

set $exec exec --no-startup-id

#
# Behaviour
#

floating_modifier $mod

focus_wrapping no
focus_follows_mouse yes
focus_on_window_activation smart

mouse_warping output
workspace_layout default
workspace_auto_back_and_forth yes

#
# Theme
#

# $ fc-list # show available fonts
#font pango:monospace 8.000000
#font pango:Monaspace Argon Frozen 8.0000
font pango:Monospace Argon 10.0000
default_border pixel 1
default_floating_border normal 2
hide_edge_borders none

gaps inner 3px
gaps outer 2px
smart_gaps on
smart_borders on

#set $olive "#405B27"
set $olive "#37422f"
set $drab  "#373D31"
set $grey  "#2a2c28"
#set $highlight "#87afb8"
set $highlight "#5b6b60"

# syntax :: colorclass   border  bg      text    indictr child_bdr
#
client.focused           #000000 $olive  #ffffff #ffffff $highlight
client.focused_inactive  #333333 #333333 #cccccc #aaaaaa $drab
client.focused_tab_title #333333 $drab   #ffffff #aaaaaa $grey
client.unfocused         #333333 #222222 #999999 #aaaaaa #222222

# note: only XWayland windows support urgency
# client.urgent            #ffffff #900000 #ffffff #ff00ff #900000

#
# Input
#

input "type:keyboard" {
  xkb_options compose:menu
}

#################################################################################
# Keybinds
#################################################################################
# unbindsym Alt+Shift+5

#
# Movement
#

# move focus
bindsym $mod+left focus left
bindsym $mod+down focus down
bindsym $mod+up focus up
bindsym $mod+right focus right

# move window
bindsym $modShift+left move left 250
bindsym $modShift+down move down 100
bindsym $modShift+up move up 100
bindsym $modShift+right move right 250

bindsym $mod+alt+left move left 50
bindsym $mod+alt+down move down 50
bindsym $mod+alt+up move up 50
bindsym $mod+alt+right move right 50

#
# Workspace
#

set $ws_dev     1:dev
set $ws_term    2:term
set $ws_web     3:web
set $ws_emacs   4:emacs
set $ws_comms    5:comms
set $ws_work    6:work
set $ws_project 7:project
set $ws_media   8:media
set $ws_ops     9:ops
set $ws_scratch 0:scratch

bindsym $mod+1  workspace $ws_dev
bindsym $mod+2  workspace $ws_term
bindsym $mod+3  workspace $ws_web
bindsym $mod+4  workspace $ws_emacs
bindsym $mod+5  workspace $ws_comms
bindsym $mod+6  workspace $ws_work
bindsym $mod+7  workspace $ws_project
bindsym $mod+8  workspace $ws_media
bindsym $mod+9  workspace $ws_ops
bindsym $mod+0  workspace $ws_scratch

bindsym $modShift+1  move container to workspace $ws_dev
bindsym $modShift+2  move container to workspace $ws_term
bindsym $modShift+3  move container to workspace $ws_web
bindsym $modShift+4  move container to workrpace $ws_emacs
bindsym $modShift+5  move container to workspace $ws_comms
bindsym $modShift+6  move container to workspace $ws_work
bindsym $modShift+7  move container to workspace $ws_project
bindsym $modShift+8  move container to workspace $ws_media
bindsym $modShift+9  move container to workspace $ws_ops
bindsym $modShift+0  move container to workspace $ws_scratch

# next / prev workspace
bindsym $mod+End workspace next
bindsym $mod+Home workspace prev

# move focused to next / prev workspace
bindsym $modShift+End move container to workspace next
bindsym $modShift+Home move container to workspace prev

#
# Swayr / Jumping around: https://sr.ht/~tsdh/swayr/
#

# jump to recent / running
bindsym $mod+Tab exec swayr switch-to-urgent-or-lru-window # last / back again
bindsym $mod+Grave exec swayr next-matching-window [app_id=__focused__] # cycle app windows
bindsym $mod+Alt+Tab exec swayr switch-window  # pick & switch
bindsym $mod+Question exec swayr switch-to     # ... containers too

# next/prev window in order of activity
bindsym $mod+h exec swayr prev-window current-workspace
bindsym $mod+i exec swayr next-window current-workspace

bindsym $modAlt+h exec swayr prev-window all-workspaces
bindsym $modAlt+i exec swayr next-window all-workspaces

# tab through terminals
bindsym $mod+apostrophe  exec swayr next-matching-window '[app_id="com.mitchellh.ghostty"]'
bindsym $meh+Space       exec swayr switch-window
bindsym $mod+Shift+Space exec swayr switch-workspace-or-window

bindsym $mod+Period      exec swayr next-window all-workspaces
bindsym $mod+Comma       exec swayr prev-window all-workspaces

bindsym $mod+Shift+x     exec swayr execute-swaymsg-command
bindsym $mod+Alt+x       exec swayr execute-swayr-command

# bindsym $mod+Deleie      exec swayr quit-window

# change workspace with meta + wheel
bindsym --whole-window {
  $mod+button4 workspace prev
  $mod+button5 workspace next
}

#
# launchers
#

bindsym $mod+space $exec fuzzel
bindsym Alt+space $exec wofi --show drun,run

# sweet, super fuzzy terminal launcher
for_window [app_id="^launcher$"] floating enable, sticky enable, resize set 30 ppt 60 ppt, border pixel 10
set $menu exec foot -a launcher -e sway-launcher-desktop
bindsym Ctrl+Alt+Space exec $menu

#
# Assign
#

# assign [app_id="firefox"] $ws_web
assign [app_id="kitty"]   $ws_term
assign [app_id="emacs"]   $ws_emacs
assign [app_id="slack"]   $ws_comms
assign [app_id="signal"]  $ws_comms
assign [class="zoom"]     $ws_comms
assign [app_id="Zoom"]    $ws_comms
assign [class="Spotify"]  $ws_media

# scratchpad: auto-float + auto-stash
for_window [app_id="com.mitchellh.ghostty" title="bough tui"] floating enable, move to scratchpad, scratchpad show
for_window [app_id="Slack"] floating enable, move to scratchpad, scratchpad show
# firefox scratchpad: manually float one window, mod+b toggles it
# for_window [app_id="spotify"] floating enable, move to scratchpad, scratchpad show
for_window [app_id="1password"] floating enable, move to scratchpad, scratchpad show

# zoom stupid annotation thing
#  #367: con "annotate_toolbar" (xwayland, pid: 1032754, instance: "zoom", class: "zoom", X11 window: 0x601C10, foreign_toplevel_id: "1a9d71c8d1666e70424919cee00c699b")
for_window [title="annotate_toolbar"] floating enable, move to workspace $ws_comms
for_window [title="Picture-in-Picture"] floating enable, sticky enable, resize set 480 270
for_window [app_id="pavucontrol"] floating enable
for_window [app_id="nm-connection-editor"] floating enable
for_window [app_id="Zoom"] floating enable, sticky enable, fullscreen false, move to workspace $ws_comms, resize set 1024 768

#
# App Shortcuts
#


bindsym $mod+b exec swaymsg [app_id=^firefox$] focus || firefox
bindsym $mod+Shift+b exec swayr next-matching-window '[app_id="firefox"]' || firefox
bindsym $meh+b exec swaymsg '[title="scratch-firefox"]' focus || exec firefox --title scratch-fox
for_window [title="scratchpad-firefox"] floating enable, move to scratchpad, scratchpad show

# for .. good luck? https://sr.ht/~tsdh/swayr/#swayr-usage
bindsym --release $mod exec swayr nop

bindsym $mod+z exec --no-startup-id grimshot savecopy area

bindsym $meh+g exec ~/.config/sway/scripts/scratchpad-signal
# bindsym $mod+e exec ~/.config/sway/scripts/scratchpad-bough
# bindsym $meh+3 exec ~/.config/sway/scripts/scratchpad-bough

bindsym $meh+y exec ~/.config/sway/scripts/scratchpad-spotify
bindsym $meh+grave exec swaymsg '[app_id="emacs"]' focus || emacs

bindsym $meh+s exec ~/.config/sway/scripts/scratchpad-slack
bindsym $meh+1 exec ~/.config/sway/scripts/scratchpad-1password
# bindsym $meh+g exec swayfiremsg [class=^Steam$] focus || steam
# bindsym $meh+f exec swaymsg [app_id=^nemo$] focus || nemo
# bindsym $meh+g exec swaymsg [app_id=^signal$] focus || signal-desktop


bindsym $mod+Return exec ghostty
bindsym $mod+Shift+Return exec firefox
bindsym $meh+apostrophe exec swaymsg [app_id=^com.mitchellh.ghostty$] focus || ghostty

#
# Other Shortcuts
#

# reap, lock, reload
bindsym $modShift+q kill
bindsym $modCtrl+l exec swaylock-fancy
bindsym $modShift+r exec "swaymsg reload; pkill waybar --signal SIGUSR2"
bindsym $modCtrl+q exit

# emergency process killer (floating htop — works even under heavy load)
bindsym $modCtrl+Delete exec kitty --class emergency-htop -o initial_window_width=120c -o initial_window_height=35c -e htop
for_window [app_id="emergency-htop"] floating enable, sticky enable, border pixel 3

# power management
# bindsym $modCtrl+Comma exec swaymsg "'output * power off'"
# bindsym $modShift+Comma exec swaymsg "'output * power on'"
# bindsym $modShift+Period exec wlopm --toggle $screen
bindsym $modShift+Period exec swaymsg "'output * dpms on'"
bindsym $modShift+Comma exec swaymsg "'output * dpms off'"

# split current object of focus
bindsym $mod+v split vertical
bindsym $mod+w split vertical

# alter layout for current object of focus
bindsym $mod+Alt+c layout toggle all
bindsym $mod+c layout toggle split
bindsym $mod+s layout stacking
bindsym $mod+t layout tabbed

# fullscreen
bindsym $mod+f fullscreen toggle

# grow / shrink focus to parent / child
bindsym $mod+j focus parent
bindsym $mod+k focus child

# scratchpad
bindsym $mod+n scratchpad show
bindsym $mod+Shift+n move scratchpad

# floating
bindsym $mod+Shift+l floating toggle
bindsym $mod+l focus mode_toggle

# sticky (floating only)
bindsym $mod+x sticky toggle

#
# Mode: Resize
#

bindsym $mod+r mode resize

mode "resize" {
  set $S 25
  set $M 100
  set $L 200

  bindsym Left  resize shrink width  $M px
  bindsym Down  resize shrink height $M px
  bindsym Up    resize grow   height $M px
  bindsym Right resize grow   width  $M px

  bindsym Shift+Left  resize shrink width     $L px
  bindsym Shift+Down  resize shrink height    $L px
  bindsym Shift+Up    resize grow   height    $L px
  bindsym Shift+Right resize grow   width     $L px

  bindsym Alt+Left  resize shrink  width  $S px
  bindsym Alt+Down  resize shrink  height $S px
  bindsym Alt+Up    resize grow    height $S px
  bindsym Alt+Right resize grow    width  $S px

  bindsym h resize shrink  width $S px
  bindsym a resize shrink height $S px
  bindsym e resize grow   height $S px
  bindsym i resize grow    width $S px

  bindsym Escape mode default
  bindsym Return mode default
}

#
# Mode: Open
#

bindsym $mod+o mode "open"

mode "open" {
  bindsym w exec wofi --show drun
  #bindsym k exec swaymsg [app_id=kitty] focus || kitty, mode default


  bindsym Escape mode default
  bindsym Return mode default
}

bindsym $meh+n mode "app"

mode "app" {
  bindsym b exec swayr switch-to-app-or-urgent-or-lru-window firefox || exec firefox, mode default
  # bindsym o exec swayr switch-to-app-or-urgent-or-lru-window ~/.local/bin/obsidian || exec ~/.local/bin/obsidian, mode default
  bindsym 1 exec ~/.config/sway/scripts/scratchpad-1password, mode default
  bindsym o exec swaymsg [app_id="obsidian"] focus || ~/.local/bin/obsidian, mode default
  bindsym k exec swaymsg [app_id="kitty"] focus || kitty, mode default
  bindsym z exec swaymsg [app_id=^dev.zed.Zed$] focus || zeditor, mode default
  bindsym Escape mode default
  bindsym Return mode default
}

#
# Mode: Layout
#

bindsym $mod+Slash mode "layout"

mode "layout" {
    bindsym h split h, mode "default"
    bindsym v split v, mode "default"
    bindsym s layout stacking, mode "default"
    bindsym t layout tabbed, mode "default"
    bindsym d layout toggle split, mode "default"
    bindsym f fullscreen toggle, mode "default"

    bindsym Escape mode default
    bindsym Return mode default
}


#
# Mode: System
#

bindsym $mod+Delete mode "system"

mode "system" {
    bindsym l exec swaylock-fancy, mode default
    bindsym s exec systemctl suspend, mode default
    bindsym r reload, mode default
    bindsym e exit, mode default
    bindsym n exec swaymsg rename workspace to "$(yad --entry --entry-text=$(swaymsg -t get_workspaces --pretty | rg focused | cut -d " " -f2))", mode default
    bindsym Delete exec swayr quit-window, mode default

    bindsym Escape mode default
    bindsym Return mode default
}


#
# Mode: Marks
#

bindsym $mod+m mode "mark"

mode "mark" {
  bindsym e mark --replace editor, mode default
  bindsym b mark --replace browser, mode default
  bindsym t mark --replace term, mode default
  bindsym a mark --replace agent, mode default
  bindsym Escape mode default
  bindsym Return mode default
}

#
# Mode: Goto
#

bindsym $mod+g mode "goto"

mode "goto" {
  bindsym e exec swayr switch-to-mark-or-urgent-or-lru-window editor, mode default
  bindsym b exec swayr switch-to-mark-or-urgent-or-lru-window browser, mode default
  bindsym t exec swayr switch-to-mark-or-urgent-or-lru-window term, mode default
  bindsym a exec swayr switch-to-mark-or-urgent-or-lru-window agent, mode default
  bindsym Escape mode default
  bindsym Return mode default
}



#
# media keys
#

bindsym XF86AudioRaiseVolume exec swayosd-client --output-volume raise --max-volume 100
bindsym XF86AudioLowerVolume exec swayosd-client --output-volume lower
bindsym XF86AudioMute exec swayosd-client --output-volume mute-toggle
bindsym XF86AudioMicMute exec swayosd-client --input-volume mute-toggle

# toggle audio device
bindsym $mod+a exec ~/.config/sway/scripts/toggle-audio-sink

# brightness
bindsym XF86MonBrightnessUp exec swayosd-client --brightness raise
bindsym XF86MonBrightnessDown exec swayosd-client --brightness lower

# play / next / prev
bindsym XF86AudioPlay exec playerctl play-pause
bindsym XF86AudioNext exec playerctl next
bindsym XF86AudioPrev exec playerctl previous

# caps-lock OSD display
bindsym --release Caps_Lock exec swayosd-client --caps-lock

# dictation
bindsym --no-repeat F5 exec ~/.config/sway/scripts/dictation-start
bindsym --release F5 exec ~/.config/sway/scripts/dictation-stop

#
# Startup
#

# ensure environment is set up right - note we may need to sleep for a couple
# seconds for this to do its thing
exec dbus-update-activation-environment --systemd --all

exec swaybg -i ~/Pictures/wallpaper/dark-water.jpg -m fill
# exec waybar -c $HOME/.config/waybar/config.jsonc

# servers
exec env RUST_BACKTRACE=1 RUST_LOG=swayr=debug swayrd > /tmp/swayrd.log 2>&1

# swayosd-server is managed by systemd (swayosd.service)
# do NOT start it here — it causes a crash loop fighting with Restart=always
exec sleep 1 && gnome-keyring-daemon --start --daemonize --components=secrets,ssh && export SSH_AUTH_SOCK
exec ssh-add

# tray
# exec sleep 1 && blueman-tray
exec blueman-applet
exec $HOME/.config/waybar/scripts/timer serve > /tmp/timer.log 2>&1
exec copyq --start-server
exec sleep 1 && udiskie
exec 1password --silent
# exec steam --silent
exec sleep 1 && flameshot
exec sleep 1 && slack --silent -u

# apps
exec firefox
exec sleep 1 && signal-desktop

exec "systemctl --user daemon-reexec" # til systemd v258
